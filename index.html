<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Suivi KPIs">
<title>Suivi KPIs</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f2f2f7;
  --bg2:       #ffffff;
  --bg3:       #e5e5ea;
  --t1:        #1d1d1f;
  --t2:        #6e6e73;
  --t3:        #aeaeb2;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.13);
  --accent:    #0071e3;
  --accent-fg: #ffffff;
  --r1: 10px; --r2: 14px; --r3: 20px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
}
.dark {
  --bg:        #000000;
  --bg2:       #1c1c1e;
  --bg3:       #2c2c2e;
  --t1:        #f5f5f7;
  --t2:        #98989d;
  --t3:        #48484a;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.14);
  --accent:    #0a84ff;
  --accent-fg: #ffffff;
}

html, body { font-family: var(--font); background: var(--bg); color: var(--t1); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── Login ── */
.login-screen {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: var(--bg); align-items: center; justify-content: center;
}
.login-screen.on { display: flex; }
.login-box {
  background: var(--bg2); border-radius: var(--r3);
  border: 0.5px solid var(--border2); padding: 40px 32px;
  width: 340px; text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}
.login-icon { font-size: 36px; margin-bottom: 12px; }
.login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--t3); margin-bottom: 28px; }
.login-field { margin-bottom: 10px; }
.login-field input {
  width: 100%; padding: 11px 14px; border-radius: var(--r1);
  border: 0.5px solid var(--border2); background: var(--bg);
  color: var(--t1); font-family: var(--font); font-size: 15px;
  outline: none; transition: border-color 0.15s; text-align: center;
}
.login-field input:focus { border-color: var(--accent); }
.login-field input::placeholder { color: var(--t3); }
.login-btn {
  width: 100%; padding: 12px; border-radius: var(--r1); margin-top: 6px;
  background: var(--accent); color: var(--accent-fg);
  border: none; font-family: var(--font); font-size: 15px;
  font-weight: 600; cursor: pointer; transition: opacity 0.15s; letter-spacing: -0.2px;
}
.login-btn:hover { opacity: 0.88; }
.login-btn:disabled { opacity: 0.35; cursor: default; }

/* ── Top bar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2); border-bottom: 0.5px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.app-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.week-row { display: flex; align-items: center; gap: 7px; }
.wk-arrow {
  width: 26px; height: 26px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: var(--bg);
  color: var(--t2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.wk-arrow:hover { background: var(--bg3); color: var(--t1); }
.wk-label {
  font-size: 13px; color: var(--t2); background: var(--bg);
  border: 0.5px solid var(--border2); border-radius: 20px;
  padding: 4px 12px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.wk-label:hover { background: var(--bg3); }
.today-btn {
  font-size: 12px; color: var(--t3); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 4px 10px; background: transparent; cursor: pointer;
}
.today-btn:hover { color: var(--t1); border-color: var(--border2); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.sync-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--t3); padding: 3px 10px;
  background: var(--bg); border: 0.5px solid var(--border); border-radius: 20px;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); transition: background 0.3s; }
.sync-dot.ok { background: #30d158; }
.sync-dot.err { background: #ff453a; }
.sync-dot.syncing { background: #ff9f0a; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.theme-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: var(--bg2);
  color: var(--t2); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.theme-btn:hover { background: var(--bg3); color: var(--t1); }
.me-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 10px 5px 6px; border-radius: 20px;
  background: var(--bg); border: 0.5px solid var(--border2); cursor: pointer;
}
.me-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: var(--accent-fg);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.me-name { font-size: 12px; font-weight: 500; color: var(--t1); }

/* ── Main ── */
.main { padding: 28px 24px 60px; }
.team-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.team-title { font-size: 13px; font-weight: 500; color: var(--t3); letter-spacing: 0.06em; text-transform: uppercase; }
.add-me-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--r1);
  border: 0.5px solid var(--accent); color: var(--accent);
  background: transparent; font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: all 0.12s;
}
.add-me-btn:hover { background: var(--accent); color: var(--accent-fg); }

/* ── Team grid ── */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.member-card {
  background: var(--bg2); border-radius: var(--r2);
  border: 0.5px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  overflow: hidden; transition: box-shadow 0.2s, transform 0.2s;
  cursor: pointer;
}
.member-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); transform: translateY(-1px); }
.member-card.is-me { border-color: var(--accent); }
.card-header {
  padding: 16px 18px 12px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
.card-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: var(--accent-fg);
  font-size: 15px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.card-avatar.alt0 { background: #30d158; }
.card-avatar.alt1 { background: #ff9f0a; }
.card-avatar.alt2 { background: #ff453a; }
.card-avatar.alt3 { background: #bf5af2; }
.card-avatar.alt4 { background: #ff375f; }
.card-avatar.alt5 { background: #00c7be; }
.card-avatar.alt6 { background: #32ade6; }
.card-avatar.alt7 { background: #ac8e68; }
.card-info { flex: 1; margin-left: 12px; }
.card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--t1); }
.card-city { font-size: 12px; color: var(--t3); margin-top: 2px; }
.card-me-tag {
  font-size: 10px; font-weight: 600; color: var(--accent);
  background: rgba(0,113,227,0.1); border-radius: 6px; padding: 2px 7px;
}
.dark .card-me-tag { background: rgba(10,132,255,0.15); }
.card-metrics { padding: 14px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card-metric { }
.cm-label { font-size: 10px; color: var(--t3); margin-bottom: 2px; letter-spacing: -0.05px; }
.cm-value { font-size: 20px; font-weight: 700; color: var(--t1); letter-spacing: -0.5px; }
.card-footer { padding: 10px 18px; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; }
.edit-hint { font-size: 11px; color: var(--t3); }

/* ── Detail modal ── */
.detail-bg {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(10px);
  align-items: center; justify-content: center; padding: 20px;
}
.detail-bg.on { display: flex; }
.detail-sheet {
  background: var(--bg2); border-radius: var(--r3);
  width: 100%; max-width: 560px; max-height: 88vh;
  overflow-y: auto; padding: 0 0 32px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.18);
}
.sheet-handle { display: none; }
.sheet-header { padding: 22px 24px 16px; display: flex; align-items: center; gap: 14px; border-bottom: 0.5px solid var(--border); }
.sheet-avatar { width: 44px; height: 44px; border-radius: 50%; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
.sheet-name { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
.sheet-city { font-size: 13px; color: var(--t3); margin-top: 2px; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--t2); font-size: 16px; flex-shrink: 0; }
.sheet-close:hover { background: var(--bg3); }
/* Sheet action buttons */
.sheet-actions { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
.sh-act-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: var(--r1); font-size: 12px;
  font-family: var(--font); cursor: pointer; transition: all 0.12s;
  border: 0.5px solid var(--border2); background: var(--bg); color: var(--t1);
}
.sh-act-btn:hover { background: var(--bg3); }
.sh-act-btn.danger { color: #ff3b30; border-color: rgba(255,59,48,0.3); }
.sh-act-btn.danger:hover { background: rgba(255,59,48,0.08); }
.sheet-section { padding: 16px 24px 0; }
.sheet-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; }
.sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sheet-metric {
  background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r1);
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
}
.sm-label { font-size: 12px; color: var(--t2); margin-bottom: 4px; }
.sm-val { font-size: 24px; font-weight: 700; letter-spacing: -0.8px; color: var(--t1); }
.sm-btns { display: flex; flex-direction: column; gap: 4px; }
.sm-btn {
  width: 26px; height: 26px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--bg2);
  color: var(--t2); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.sm-btn:hover { background: var(--accent); color: #fff; border-color: transparent; }
.sm-btn:active { transform: scale(0.9); }
.sheet-notes { margin: 16px 24px 0; }
.sheet-notes textarea {
  width: 100%; padding: 11px 13px; border-radius: var(--r1);
  border: 0.5px solid var(--border2); background: var(--bg);
  color: var(--t1); font-family: var(--font); font-size: 13px; line-height: 1.6;
  resize: none; outline: none; transition: border-color 0.15s;
}
.sheet-notes textarea:focus { border-color: var(--accent); }
.sheet-notes textarea::placeholder { color: var(--t3); }

/* ── Calendar modal ── */
.cal-bg {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.cal-bg.on { display: flex; }
.cal-box {
  background: var(--bg2); border-radius: var(--r3);
  border: 0.5px solid var(--border2); padding: 22px;
  width: 320px; max-height: 85vh; display: flex; flex-direction: column;
}
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-head h3 { font-size: 16px; font-weight: 700; }
.cal-nav { display: flex; gap: 6px; }
.cal-nav-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border2); background: transparent; color: var(--t2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.cal-nav-btn:hover { background: var(--bg3); color: var(--t1); }
.cal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; overflow-y: auto; flex: 1; }
.cal-wk {
  padding: 8px 10px; border-radius: var(--r1); border: 0.5px solid var(--border);
  background: transparent; color: var(--t1); font-size: 12px; cursor: pointer;
  text-align: left; font-family: var(--font); transition: all 0.1s;
}
.cal-wk:hover { background: var(--bg3); }
.cal-wk.current { border-color: var(--accent); }
.cal-wk.selected { background: var(--accent); color: #fff; border-color: transparent; }
.cal-footer { margin-top: 12px; text-align: right; }
.cal-close-btn { padding: 7px 16px; border-radius: var(--r1); border: 0.5px solid var(--border2); background: transparent; color: var(--t2); font-family: var(--font); font-size: 13px; cursor: pointer; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 80px 24px; color: var(--t3); }
.empty-state .big { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; line-height: 1.6; }

/* ── Toast ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--t1); color: var(--bg2); padding: 9px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.22s; pointer-events: none; z-index: 600; white-space: nowrap; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .topbar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
  .team-grid { grid-template-columns: 1fr; }
  .sheet-grid { grid-template-columns: 1fr; }
  .wk-label { font-size: 12px; padding: 4px 9px; }
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen on" id="login-screen">
  <div class="login-box">
    <div class="login-icon">📊</div>
    <div class="login-title">Suivi KPIs</div>
    <div class="login-sub">Crée ton profil ou retrouve ton espace</div>
    <div class="login-field"><input type="text" id="login-name" placeholder="Ton prénom" maxlength="30" autocomplete="off" /></div>
    <div class="login-field"><input type="text" id="login-city" placeholder="Ta ville (ex: Lyon)" maxlength="40" autocomplete="off" /></div>
    <button class="login-btn" id="login-btn" disabled onclick="doLogin()">Accéder →</button>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="app-title">Suivi KPIs</span>
    <div class="week-row">
      <button class="wk-arrow" onclick="changeWeek(-1)">‹</button>
      <button class="wk-label" id="wk-label" onclick="openCal()"></button>
      <button class="wk-arrow" onclick="changeWeek(1)">›</button>
      <button class="today-btn" onclick="goToday()">Aujourd'hui</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="sync-pill"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">—</span></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
    <div class="me-badge" id="me-badge" onclick="openMyCard()" title="Mon profil">
      <div class="me-avatar" id="me-avatar">?</div>
      <span class="me-name" id="me-name">—</span>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="team-header">
    <span class="team-title">Équipe</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="add-me-btn" onclick="exportGlobalCSV()" style="border-color:var(--border2);color:var(--t2)">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M5 8l3 3 3-3M3 13h10"/></svg>
        Exporter tout
      </button>
      <button class="add-me-btn" id="add-me-btn" onclick="openMyCard()" style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Rejoindre l'équipe
      </button>
    </div>
  </div>
  <div class="team-grid" id="team-grid"></div>
</div>

<!-- Detail sheet -->
<div class="detail-bg" id="detail-bg" onclick="closeDetail(e)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-avatar" id="sh-avatar"></div>
      <div>
        <div class="sheet-name" id="sh-name"></div>
        <div class="sheet-city" id="sh-city"></div>
      </div>
      <button class="sheet-close" onclick="closeDetail()">×</button>
    </div>
    <div class="sheet-actions">
      <button class="sh-act-btn" onclick="exportMemberCSV()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M5 8l3 3 3-3M3 13h10"/></svg>
        Exporter Excel
      </button>
      <button class="sh-act-btn danger" onclick="deleteMember()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,4 4,4 13,4"/><path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M6 7v5M10 7v5"/><path d="M4 4l1 9a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1l1-9"/></svg>
        Supprimer le membre
      </button>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-label">Activité</div>
      <div class="sheet-grid" id="sh-grid-act"></div>
    </div>
    <div class="sheet-section" style="margin-top:14px">
      <div class="sheet-section-label">Résultats</div>
      <div class="sheet-grid" id="sh-grid-res"></div>
    </div>
    <div class="sheet-notes">
      <div class="sheet-section-label" style="margin-bottom:8px">Notes</div>
      <textarea id="sh-notes" rows="3" placeholder="Observations, relances…"></textarea>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="cal-bg" id="cal-bg" onclick="if(event.target===this)closeCal()">
  <div class="cal-box">
    <div class="cal-head">
      <h3 id="cal-year">2026</h3>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calShift(-1)">‹</button>
        <button class="cal-nav-btn" onclick="calShift(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-footer"><button class="cal-close-btn" onclick="closeCal()">Fermer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Firebase ──────────────────────────────────────────────────────
const FB = 'https://suivi-kpi-2cb67-default-rtdb.europe-west1.firebasedatabase.app';

// ── Metrics ───────────────────────────────────────────────────────
const ACT = [
  { key:'pr_en_cours',    label:'PR en cours (global)' },
  { key:'annonces',       label:'Annonces sourcées' },
  { key:'nouveaux_pr',    label:'Nouveaux PR' },
  { key:'envois_cv',      label:'Envois de CV' },
];
const RES = [
  { key:'matching_pr',    label:'Matching PR' },
  { key:'matching_suivi', label:'Matching suivi' },
  { key:'ca_signes',      label:'CA signés' },
  { key:'cp_signes',      label:'CP signés' },
];
const ALL = [...ACT, ...RES];
const SUMMARY = ['pr_en_cours','envois_cv','matching_pr','ca_signes'];

// ── State ─────────────────────────────────────────────────────────
let ME = null; // { key, name, city }
let currentWeek = wkKey(new Date());
let teamData = {}; // { userKey: { name, city, data: { week: { metrics } } } }
let detailKey = null;
let _saveTimer = null;
let calYear = new Date().getFullYear();
let _pollTimer = null;

// ── Week helpers (Sam → Ven) ──────────────────────────────────────
function wkKey(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 6 ? 0 : day + 1));
  const y = d.getFullYear();
  const s = new Date(y,0,1);
  const firstSatOff = (6 - s.getDay() + 7) % 7;
  const firstSat = new Date(y,0,1+firstSatOff);
  let w = Math.floor((d - firstSat)/(7*86400000)) + 1;
  if (w < 1) w = 1;
  return `${y}-SW${String(w).padStart(2,'0')}`;
}
function wkSat(wk) {
  const [y,w] = wk.split('-SW');
  const s = new Date(+y,0,1);
  const firstSatOff = (6 - s.getDay() + 7) % 7;
  const firstSat = new Date(+y,0,1+firstSatOff);
  const sat = new Date(firstSat);
  sat.setDate(firstSat.getDate() + (+w-1)*7);
  return sat;
}
function wkLabel(wk) {
  const sat = wkSat(wk);
  const fri = new Date(sat); fri.setDate(sat.getDate()+6);
  const f = d => d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  return `Sem. ${+wk.split('-SW')[1]}  ·  ${f(sat)} – ${f(fri)}`;
}
function shiftWk(wk, n) {
  const sat = wkSat(wk); sat.setDate(sat.getDate()+n*7); return wkKey(sat);
}
function weeksInYear(y) {
  const s = new Date(y,0,1), off = (6-s.getDay()+7)%7;
  const firstSat = new Date(y,0,1+off);
  return Math.floor((new Date(y,11,31)-firstSat)/(7*86400000))+1;
}

// ── Sync helpers ──────────────────────────────────────────────────
function setSync(state, text) {
  const d = document.getElementById('sync-dot');
  const t = document.getElementById('sync-text');
  if (d) d.className = 'sync-dot' + (state ? ' '+state : '');
  if (t) t.textContent = text || '';
}

async function pushMyData() {
  if (!ME) return;
  setSync('syncing','Sync…');
  try {
    const payload = { name: ME.name, city: ME.city, data: teamData[ME.key]?.data || {} };
    const res = await fetch(`${FB}/team/${ME.key}.json`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    setSync(res.ok ? 'ok' : 'err', res.ok ? 'Synchronisé' : 'Erreur');
    setTimeout(()=>setSync('',''),3000);
  } catch(e) { setSync('err','Hors ligne'); }
}

async function fetchTeam() {
  try {
    const res = await fetch(`${FB}/team.json`);
    if (!res.ok) return;
    const remote = await res.json();
    if (!remote) return;
    // Merge remote into teamData
    Object.entries(remote).forEach(([key, val]) => {
      if (!teamData[key]) teamData[key] = { name: val.name, city: val.city, data: {} };
      else { teamData[key].name = val.name; teamData[key].city = val.city; }
      if (val.data) teamData[key].data = val.data;
    });
    renderTeam();
    if (detailKey) renderDetail(detailKey);
  } catch(e) {}
}

function startPolling() {
  clearInterval(_pollTimer);
  _pollTimer = setInterval(() => { if (!document.hidden) fetchTeam(); }, 15000);
}

// ── Login ─────────────────────────────────────────────────────────
function userKey(name) {
  return name.trim().toLowerCase().replace(/[^a-z0-9]/g,'_');
}

function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const city = document.getElementById('login-city').value.trim();
  if (!name) return;
  ME = { key: userKey(name), name, city: city || '—' };
  localStorage.setItem('me_v2', JSON.stringify(ME));
  document.getElementById('login-screen').classList.remove('on');
  initMe();
  // Create my slot if not exists
  if (!teamData[ME.key]) teamData[ME.key] = { name: ME.name, city: ME.city, data: {} };
  else { teamData[ME.key].name = ME.name; teamData[ME.key].city = ME.city; }
  pushMyData();
  fetchTeam().then(() => renderTeam());
  startPolling();
}

function initMe() {
  document.getElementById('me-avatar').textContent = ME.name.charAt(0).toUpperCase();
  document.getElementById('me-name').textContent = ME.name;
  document.getElementById('add-me-btn').style.display = 'none';
}

// ── Get data ──────────────────────────────────────────────────────
function getMemberWeek(key, week) {
  if (!teamData[key]) return null;
  if (!teamData[key].data) teamData[key].data = {};
  if (!teamData[key].data[week]) {
    teamData[key].data[week] = {};
    ALL.forEach(m => { teamData[key].data[week][m.key] = 0; });
    teamData[key].data[week]._notes = '';
  }
  return teamData[key].data[week];
}

// ── Render team grid ──────────────────────────────────────────────
const COLORS = ['alt0','alt1','alt2','alt3','alt4','alt5','alt6','alt7'];
function colorFor(key) {
  let h = 0; for (let c of key) h = (h*31+c.charCodeAt(0))%COLORS.length;
  return COLORS[h];
}

function renderTeam() {
  document.getElementById('wk-label').textContent = wkLabel(currentWeek);
  const grid = document.getElementById('team-grid');
  const keys = Object.keys(teamData).sort();
  if (!keys.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">👥</div><p>Personne encore.<br>Sois le premier à rejoindre !</p></div>';
    return;
  }
  grid.innerHTML = '';
  keys.forEach((key, idx) => {
    const m = teamData[key];
    const d = getMemberWeek(key, currentWeek);
    const isMe = ME && key === ME.key;
    const col = colorFor(key);
    const initial = (m.name||'?').charAt(0).toUpperCase();

    // Summary: PR, CV, Matching, Contrats
    const summaryMetrics = [
      { label: 'PR en cours', val: d.pr_en_cours||0 },
      { label: 'CV envoyés',  val: d.envois_cv||0 },
      { label: 'Matchings',   val: (d.matching_pr||0)+(d.matching_suivi||0) },
      { label: 'Contrats',    val: (d.ca_signes||0)+(d.cp_signes||0) },
    ];

    const card = document.createElement('div');
    card.className = 'member-card' + (isMe ? ' is-me' : '');
    card.innerHTML = `
      <div class="card-header">
        <div class="card-avatar ${col}">${initial}</div>
        <div class="card-info">
          <div class="card-name">${m.name}</div>
          <div class="card-city">${m.city}</div>
        </div>
        ${isMe ? '<span class="card-me-tag">Moi</span>' : ''}
      </div>
      <div class="card-metrics">
        ${summaryMetrics.map(s=>`
          <div class="card-metric">
            <div class="cm-label">${s.label}</div>
            <div class="cm-value">${s.val}</div>
          </div>`).join('')}
      </div>
      <div class="card-footer"><span class="edit-hint">Appuyer pour modifier →</span></div>`;
    card.onclick = () => openDetail(key);
    grid.appendChild(card);
  });
}

// ── Detail sheet ──────────────────────────────────────────────────
function openDetail(key) {
  detailKey = key;
  renderDetail(key);
  document.getElementById('detail-bg').classList.add('on');
}
function closeDetail() {
  document.getElementById('detail-bg').classList.remove('on');
  detailKey = null;
}
document.getElementById('detail-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-bg')) closeDetail();
});

function renderDetail(key) {
  const m = teamData[key];
  if (!m) return;
  const d = getMemberWeek(key, currentWeek);
  const col = colorFor(key);

  document.getElementById('sh-avatar').textContent = m.name.charAt(0).toUpperCase();
  document.getElementById('sh-avatar').className = `sheet-avatar ${col}`;
  document.getElementById('sh-name').textContent = m.name;
  document.getElementById('sh-city').textContent = m.city;
  document.getElementById('sh-notes').value = d._notes || '';
  document.getElementById('sh-notes').oninput = () => {
    d._notes = document.getElementById('sh-notes').value;
    scheduleSave();
  };

  renderSheetGrid('sh-grid-act', ACT, key, d);
  renderSheetGrid('sh-grid-res', RES, key, d);
}

function renderSheetGrid(containerId, metrics, key, d) {
  const g = document.getElementById(containerId);
  g.innerHTML = '';
  metrics.forEach(m => {
    const div = document.createElement('div');
    div.className = 'sheet-metric';
    div.innerHTML = `
      <div>
        <div class="sm-label">${m.label}</div>
        <div class="sm-val" id="sv-${key}-${m.key}">${d[m.key]||0}</div>
      </div>
      <div class="sm-btns">
        <button class="sm-btn" onclick="adj('${key}','${m.key}',1)">+</button>
        <button class="sm-btn" onclick="adj('${key}','${m.key}',-1)">−</button>
      </div>`;
    g.appendChild(div);
  });
}

function adj(key, metric, delta) {
  const d = getMemberWeek(key, currentWeek);
  d[metric] = Math.max(0, (d[metric]||0) + delta);
  const el = document.getElementById(`sv-${key}-${metric}`);
  if (el) el.textContent = d[metric];
  renderTeam();
  scheduleSave(key);
}

function scheduleSave(key) {
  const targetKey = key || (ME ? ME.key : null);
  if (!targetKey || !ME) return;
  // Always push MY data; if editing someone else, also push their data
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    // Push my data
    await pushMyData();
    // If editing someone else, push their data too
    if (targetKey !== ME.key && teamData[targetKey]) {
      try {
        const payload = { name: teamData[targetKey].name, city: teamData[targetKey].city, data: teamData[targetKey].data };
        await fetch(`${FB}/team/${targetKey}.json`, {
          method: 'PUT', headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
      } catch(e) {}
    }
  }, 800);
}

function openMyCard() {
  if (ME && teamData[ME.key]) openDetail(ME.key);
}

// ── Week navigation ───────────────────────────────────────────────
function changeWeek(n) { currentWeek = shiftWk(currentWeek, n); renderTeam(); if(detailKey) renderDetail(detailKey); }
function goToday() { currentWeek = wkKey(new Date()); renderTeam(); if(detailKey) renderDetail(detailKey); }

// ── Calendar ──────────────────────────────────────────────────────
function openCal() {
  calYear = parseInt(currentWeek.split('-SW')[0]) || new Date().getFullYear();
  renderCalGrid();
  document.getElementById('cal-bg').classList.add('on');
  setTimeout(() => { const s = document.querySelector('.cal-wk.selected'); if(s) s.scrollIntoView({block:'center'}); }, 80);
}
function closeCal() { document.getElementById('cal-bg').classList.remove('on'); }
function calShift(n) { calYear += n; renderCalGrid(); }
function renderCalGrid() {
  document.getElementById('cal-year').textContent = calYear;
  const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
  const todayWk = wkKey(new Date());
  const total = weeksInYear(calYear);
  for (let w=1; w<=total; w++) {
    const wk = `${calYear}-SW${String(w).padStart(2,'0')}`;
    const sat = wkSat(wk);
    const fri = new Date(sat); fri.setDate(sat.getDate()+6);
    const f = d => d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    const btn = document.createElement('button');
    btn.className = 'cal-wk'+(wk===currentWeek?' selected':'')+(wk===todayWk?' current':'');
    btn.innerHTML = `<span style="color:var(--t3);font-size:10px">S${w} </span>${f(sat)} – ${f(fri)}`;
    btn.onclick = () => { currentWeek = wk; renderTeam(); if(detailKey) renderDetail(detailKey); closeCal(); };
    grid.appendChild(btn);
  }
}


// ── Export ────────────────────────────────────────────────────────
function dlCSV(content, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+content], {type:'text/csv;charset=utf-8;'}));
  a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Fichier exporté !');
}

function exportMemberCSV() {
  if (!detailKey || !teamData[detailKey]) return;
  const m = teamData[detailKey];
  const headers = ['Semaine', ...ALL.map(x=>x.label), 'Notes'];
  const rows = [headers.join(';')];
  Object.keys(m.data||{}).sort().forEach(wk => {
    const d = m.data[wk];
    if (!ALL.some(x=>(d[x.key]||0)>0) && !d._notes) return;
    rows.push([wk, ...ALL.map(x=>d[x.key]||0), (d._notes||'').replace(/;|
/g,' ')].join(';'));
  });
  dlCSV(rows.join('
'), `${m.name}_${m.city}_kpis.csv`);
}

function exportGlobalCSV() {
  const headers = ['Semaine', 'Prénom', 'Ville', ...ALL.map(x=>x.label), 'Notes'];
  const rows = [headers.join(';')];
  Object.values(teamData).forEach(m => {
    Object.keys(m.data||{}).sort().forEach(wk => {
      const d = m.data[wk];
      if (!ALL.some(x=>(d[x.key]||0)>0) && !d._notes) return;
      rows.push([wk, m.name, m.city, ...ALL.map(x=>d[x.key]||0), (d._notes||'').replace(/;|
/g,' ')].join(';'));
    });
  });
  dlCSV(rows.join('
'), `equipe_kpis_${currentWeek}.csv`);
}

// ── Delete member ─────────────────────────────────────────────────
async function deleteMember() {
  if (!detailKey) return;
  const m = teamData[detailKey];
  if (!confirm(`Supprimer ${m.name} (${m.city}) et toutes ses données ?`)) return;
  // If deleting myself, clear local storage
  if (ME && detailKey === ME.key) {
    localStorage.removeItem('me_v2');
    ME = null;
  }
  try {
    await fetch(`${FB}/team/${detailKey}.json`, { method: 'DELETE' });
  } catch(e) {}
  delete teamData[detailKey];
  closeDetail();
  renderTeam();
  toast('Membre supprimé');
  // If deleted self, reload to show login
  if (!ME) setTimeout(() => location.reload(), 1500);
}

// ── Loading state ─────────────────────────────────────────────────
function showLoading() {
  document.getElementById('team-grid').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--t3)">
      <div style="font-size:32px;margin-bottom:12px">⏳</div>
      <div style="font-size:14px">Chargement de l'équipe…</div>
    </div>`;
}

// ── Dark mode ─────────────────────────────────────────────────────
const MOON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const SUN  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('theme-btn').innerHTML = dark ? SUN : MOON;
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
function toggleTheme() { applyTheme(!document.documentElement.classList.contains('dark')); }

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────
applyTheme(localStorage.getItem('theme') === 'dark');

// Login form validation
['login-name','login-city'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => {
    const n = document.getElementById('login-name').value.trim();
    document.getElementById('login-btn').disabled = !n;
  });
});
document.getElementById('login-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-city').focus(); });
document.getElementById('login-city').addEventListener('keydown', e => { if(e.key==='Enter' && document.getElementById('login-name').value.trim()) doLogin(); });

// Auto-login if valid session exists
try {
  const savedMe = localStorage.getItem('me_v2');
  if (savedMe) {
    const parsed = JSON.parse(savedMe);
    if (parsed && parsed.name && parsed.key) {
      ME = parsed;
      initMe();
      document.getElementById('login-screen').classList.remove('on');
      showLoading();
      fetchTeam().then(() => {
        if (!teamData[ME.key]) teamData[ME.key] = { name: ME.name, city: ME.city, data: {} };
        else { teamData[ME.key].name = ME.name; teamData[ME.key].city = ME.city; }
        pushMyData();
        renderTeam();
      }).catch(() => renderTeam());
      startPolling();
    }
  }
} catch(e) {
  console.log('No valid session, showing login');
}
</script>
